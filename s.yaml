edition: 3.0.0
name: boletalk-agent-app
access: "default"
vars:
  region: "ap-southeast-1"
  functionName: "boletalk-agent"
resources:
  framework:
    component: fc3
    actions:
      pre-deploy:
        # -------------------------------------------------------------------------
        # 升级 Node.js 版本（Next.js 16 要求 >= 20.9.0，FC 官方层只有 20.8.1）
        # -------------------------------------------------------------------------
        - run: export PATH=/usr/local/versions/node/v20.8.1/bin:$PATH && npm install -g n && n 20
        # -------------------------------------------------------------------------
        # 安装依赖（本项目使用 pnpm）
        # -------------------------------------------------------------------------
        - run: export PATH=/usr/local/bin:$PATH && npm install -g pnpm@9
        - run: export PATH=/usr/local/bin:$PATH && pnpm install
        # -------------------------------------------------------------------------
        # 生成 .env.local 文件，引用流水线环境变量
        # -------------------------------------------------------------------------
        - run: echo "POSTGRES_URL=${env(POSTGRES_URL)}" > .env.local
        - run: echo "DEEPSEEK_API_KEY=${env(DEEPSEEK_API_KEY)}" >> .env.local
        - run: echo "ZHIPU_API_KEY=${env(ZHIPU_API_KEY)}" >> .env.local
        - run: echo "MINIMAX_API_KEY=${env(MINIMAX_API_KEY)}" >> .env.local
        - run: echo "FISH_AUDIO_API_KEY=${env(FISH_AUDIO_API_KEY)}" >> .env.local
        - run: echo "GROQ_API_KEY=${env(GROQ_API_KEY)}" >> .env.local
        - run: echo "AUTH_SECRET=${env(AUTH_SECRET)}" >> .env.local
        - run: echo "AUTH_TRUST_HOST=true" >> .env.local
        - run: echo "AUTH_GITHUB_ID=${env(AUTH_GITHUB_ID)}" >> .env.local
        - run: echo "AUTH_GITHUB_SECRET=${env(AUTH_GITHUB_SECRET)}" >> .env.local
        - run: echo "EMAIL_HOST=${env(EMAIL_HOST)}" >> .env.local
        - run: echo "EMAIL_PORT=${env(EMAIL_PORT)}" >> .env.local
        - run: echo "EMAIL_USER=${env(EMAIL_USER)}" >> .env.local
        - run: echo "EMAIL_PASSWORD=${env(EMAIL_PASSWORD)}" >> .env.local
        - run: echo "EMAIL_FROM=${env(EMAIL_FROM)}" >> .env.local
        # Mode 3 - Realtime Voice Interview
        - run: echo "BOLE_SERVER_WS_URL=${env(BOLE_SERVER_WS_URL)}" >> .env.local
        - run: echo "REALTIME_SESSION_SECRET=${env(REALTIME_SESSION_SECRET)}" >> .env.local
        # Mode 4 - Avatar Digital Human
        - run: echo "ALIBABA_CLOUD_ACCESS_KEY_ID=${env(ALIBABA_CLOUD_ACCESS_KEY_ID)}" >> .env.local
        - run: echo "ALIBABA_CLOUD_ACCESS_KEY_SECRET=${env(ALIBABA_CLOUD_ACCESS_KEY_SECRET)}" >> .env.local
        - run: echo "AVATAR_TENANT_ID=${env(AVATAR_TENANT_ID)}" >> .env.local
        - run: echo "AVATAR_APP_ID=${env(AVATAR_APP_ID)}" >> .env.local
        - run: echo "AVATAR_INSTANCE_ID=${env(AVATAR_INSTANCE_ID)}" >> .env.local
        # 豆包语音（流式 STT + 流式 TTS，火山引擎）
        - run: echo "DOUBAO_VOICE_APP_ID=${env(DOUBAO_VOICE_APP_ID)}" >> .env.local
        - run: echo "DOUBAO_VOICE_ACCESS_TOKEN=${env(DOUBAO_VOICE_ACCESS_TOKEN)}" >> .env.local
        - run: echo "DOUBAO_TTS_VOICE_TYPE=${env(DOUBAO_TTS_VOICE_TYPE)}" >> .env.local
        # 阿里云智能语音交互（实时 ASR）
        - run: echo "ALI_NLS_APPKEY=${env(ALI_NLS_APPKEY)}" >> .env.local
        # 智谱 GLM API Key
        - run: echo "GLM_API_KEY=${env(GLM_API_KEY)}" >> .env.local
        # 阿里云百炼 DashScope
        - run: echo "DASHSCOPE_API_KEY=${env(DASHSCOPE_API_KEY)}" >> .env.local
        # GitHub MCP - 分析候选人开源项目
        - run: echo "GITHUB_TOKEN=${env(GITHUB_TOKEN)}" >> .env.local
        # Tavily Web Search MCP - 搜索候选人技术博客/社区贡献
        - run: echo "TAVILY_API_KEY=${env(TAVILY_API_KEY)}" >> .env.local
        # -------------------------------------------------------------------------
        # 构建 Next.js standalone 产物
        # -------------------------------------------------------------------------
        - run: export PATH=/usr/local/bin:$PATH && npx next build
        - run: cp -r public .next/standalone/public
        - run: mv static standalone/.next/static
          path: ./.next
    props:
      region: ${vars.region}
      description: BoleTalk AI Agent - 全栈应用
      runtime: custom.debian10
      timeout: 60
      memorySize: 512
      layers:
        - acs:fc:${vars.region}:official:layers/Nodejs20/versions/1
      # -------------------------------------------------------------------------
      # 运行时环境变量
      # -------------------------------------------------------------------------
      environmentVariables:
        PATH: >-
          /opt/nodejs20/bin:/usr/local/bin/apache-maven/bin:/usr/local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/local/ruby/bin
        NODE_ENV: production
        POSTGRES_URL: ${env(POSTGRES_URL)}
        DEEPSEEK_API_KEY: ${env(DEEPSEEK_API_KEY)}
        ZHIPU_API_KEY: ${env(ZHIPU_API_KEY)}
        MINIMAX_API_KEY: ${env(MINIMAX_API_KEY)}
        FISH_AUDIO_API_KEY: ${env(FISH_AUDIO_API_KEY)}
        GROQ_API_KEY: ${env(GROQ_API_KEY)}
        AUTH_SECRET: ${env(AUTH_SECRET)}
        AUTH_TRUST_HOST: "true"
        AUTH_GITHUB_ID: ${env(AUTH_GITHUB_ID)}
        AUTH_GITHUB_SECRET: ${env(AUTH_GITHUB_SECRET)}
        EMAIL_HOST: ${env(EMAIL_HOST)}
        EMAIL_PORT: ${env(EMAIL_PORT)}
        EMAIL_USER: ${env(EMAIL_USER)}
        EMAIL_PASSWORD: ${env(EMAIL_PASSWORD)}
        EMAIL_FROM: ${env(EMAIL_FROM)}
        # Mode 3 - Realtime Voice Interview
        BOLE_SERVER_WS_URL: ${env(BOLE_SERVER_WS_URL)}
        REALTIME_SESSION_SECRET: ${env(REALTIME_SESSION_SECRET)}
        # Mode 4 - Avatar Digital Human
        ALIBABA_CLOUD_ACCESS_KEY_ID: ${env(ALIBABA_CLOUD_ACCESS_KEY_ID)}
        ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${env(ALIBABA_CLOUD_ACCESS_KEY_SECRET)}
        AVATAR_TENANT_ID: ${env(AVATAR_TENANT_ID)}
        AVATAR_APP_ID: ${env(AVATAR_APP_ID)}
        AVATAR_INSTANCE_ID: ${env(AVATAR_INSTANCE_ID)}
        # 豆包语音（流式 STT + 流式 TTS，火山引擎）
        DOUBAO_VOICE_APP_ID: ${env(DOUBAO_VOICE_APP_ID)}
        DOUBAO_VOICE_ACCESS_TOKEN: ${env(DOUBAO_VOICE_ACCESS_TOKEN)}
        DOUBAO_TTS_VOICE_TYPE: ${env(DOUBAO_TTS_VOICE_TYPE)}
        # 阿里云智能语音交互（实时 ASR）
        ALI_NLS_APPKEY: ${env(ALI_NLS_APPKEY)}
        # 智谱 GLM API Key
        GLM_API_KEY: ${env(GLM_API_KEY)}
        # 阿里云百炼 DashScope
        DASHSCOPE_API_KEY: ${env(DASHSCOPE_API_KEY)}
        # GitHub MCP - 分析候选人开源项目
        GITHUB_TOKEN: ${env(GITHUB_TOKEN)}
        # Tavily Web Search MCP - 搜索候选人技术博客/社区贡献
        TAVILY_API_KEY: ${env(TAVILY_API_KEY)}
      customRuntimeConfig:
        command:
          - node
          - server.js
        port: 3000
      functionName: ${vars.functionName}
      code: ./.next/standalone
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
  fc3_domain_0:
    component: fc3-domain
    props:
      region: ${vars.region}
      domainName: auto
      protocol: HTTP
      routeConfig:
        routes:
          - path: /*
            functionName: ${vars.functionName}
